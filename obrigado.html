<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="64x64" href="assets/images/favicon-64.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/images/apple-touch-icon.png">

  <style>
    @font-face {
      font-family: 'Aminute';
      src: url('assets/fonts/Aminute.ttf') format('truetype');
      font-weight: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Gotham';
      src: url('assets/fonts/Gotham-Light.otf') format('opentype');
      font-weight: 300;
      font-display: swap;
    }
    @font-face {
      font-family: 'Gotham';
      src: url('assets/fonts/Gotham-Book.otf') format('opentype');
      font-weight: 400;
      font-display: swap;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --c-black:   #0C0C0C;
      --c-green:   #1B3A34;
      --c-cream:   #F4EFE3;
      --c-cream-60: rgba(244,239,227,.6);
      --c-cream-30: rgba(244,239,227,.3);
      --c-gold:    #C9A86B;
      --c-gold-hi: #D9BC84;
      --c-border:  rgba(244,239,227,.1);
      --f-display: 'Aminute', Georgia, serif;
      --f-body:    'Gotham', system-ui, sans-serif;
      --ease-out:  cubic-bezier(0,0,.2,1);
    }

    html, body {
      height: 100%;
      font-family: var(--f-body);
      background: var(--c-black);
      color: var(--c-cream);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,107,.06) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .page > * { position: relative; z-index: 1; }

    .logo {
      font-family: var(--f-display);
      font-size: 20px;
      color: var(--c-gold);
      letter-spacing: 3px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp .8s var(--ease-out) .1s forwards;
    }

    .check-ring {
      width: 64px;
      height: 64px;
      border: 1px solid rgba(201,168,107,.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 40px;
      opacity: 0;
      animation: fadeUp .8s var(--ease-out) .3s forwards;
    }

    .eyebrow {
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--c-gold);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp .8s var(--ease-out) .5s forwards;
    }

    h1 {
      font-family: var(--f-display);
      font-size: clamp(32px, 7vw, 68px);
      font-weight: normal;
      color: var(--c-cream);
      line-height: 1.25;
      max-width: 560px;
      margin: 0 auto 24px;
      opacity: 0;
      animation: fadeUp .8s var(--ease-out) .7s forwards;
    }

    .body-text {
      font-weight: 300;
      font-size: 14px;
      line-height: 1.85;
      color: var(--c-cream-60);
      max-width: 400px;
      margin: 0 auto 52px;
      opacity: 0;
      animation: fadeUp .8s var(--ease-out) .9s forwards;
    }

    .actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeUp .8s var(--ease-out) 1.1s forwards;
    }

    .btn-instagram {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 36px;
      background: var(--c-gold);
      color: var(--c-black);
      font-family: var(--f-body);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      transition: background .3s;
    }
    .btn-instagram:hover { background: var(--c-gold-hi); }

    .btn-back {
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--c-cream-30);
      text-decoration: none;
      transition: color .3s;
    }
    .btn-back:hover { color: var(--c-cream-60); }

    .divider {
      width: 36px;
      height: 1px;
      background: var(--c-gold);
      opacity: .3;
      margin: 0 auto 48px;
      opacity: 0;
      animation: fadeIn .8s var(--ease-out) .6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: .3; }
    }
  </style>
</head>
<body>
  <div class="page">

    <p class="logo">paffio</p>

    <div class="check-ring">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4.5 11L9 15.5L17.5 7" stroke="#C9A86B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <p class="eyebrow">Cadastro confirmado</p>

    <div class="divider"></div>

    <h1>Você está<br>dentro.</h1>

    <p class="body-text">
      Você vai receber sua oferta exclusiva antes do dia 1º de agosto. Fique de olho no seu e-mail.
    </p>

    <div class="actions">
      <a href="https://www.instagram.com/paffiocafe/" target="_blank" rel="noopener noreferrer" class="btn-instagram">
        Seguir @paffiocafe
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7H12M12 7L8 3M12 7L8 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <a href="index.html" class="btn-back">← Voltar ao início</a>
    </div>

  </div>
</body>
</html>
